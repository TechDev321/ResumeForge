services:
  - type: web
    name: resumeforge-api
    runtime: python
    rootDir: Backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: CORS_ORIGINS
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: RESUME_CACHE
        value: "0"
      - key: COVER_LETTER_CACHE
        value: "0"
      - key: QUESTION_CACHE
        value: "0"
